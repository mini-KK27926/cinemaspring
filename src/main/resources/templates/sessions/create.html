<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Новый сеанс | CINEMA PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0f0c29, #302b63); min-height: 100vh; color: white; }
        .form-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 15px; padding: 30px; border: 1px solid rgba(255,255,255,0.2); }
        .form-control, .form-select { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.3); color: white; }
        option { background: #302b63; color: white; }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="form-card">
                <h2 class="mb-4 text-center">Создание сеанса</h2>
                <form th:action="@{/sessions}" th:object="${sess}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Выберите фильм</label>
                        <select class="form-select" th:field="*{filmId}" required>
                            <option value="">-- Нажмите для выбора --</option>
                            <option th:each="f : ${films}" th:value="${f.filmId}" th:text="${f.title}"></option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Дата</label>
                        <input type="date" class="form-control" th:field="*{sessionDate}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Время начала</label>
                        <input type="time" class="form-control" th:field="*{startTime}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Цена билета</label>
                        <input type="number" step="0.01" class="form-control" th:field="*{ticketPrice}" required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success">Добавить</button>
                        <a href="/sessions" class="btn btn-outline-light">Назад</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
