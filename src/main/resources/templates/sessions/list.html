<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Расписание сеансов | Кинотеатр</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); color: white; min-height: 100vh; }
        .session-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .time-badge { background: #ffd700; color: #000; font-weight: bold; padding: 5px 12px; border-radius: 6px; }
        .price-text { color: #00ff88; font-weight: bold; }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <h2><i class="bi bi-calendar3"></i> Расписание сеансов</h2>
        <a href="/sessions/create" class="btn btn-success">Добавить сеанс</a>
    </div>
    <div class="row g-4">
        <div class="col-md-6 col-lg-4" th:each="s : ${sessions}">
            <div class="session-card p-4 h-100 d-flex flex-column">
                <div class="d-flex justify-content-between mb-3">
                    <span class="time-badge" th:text="${s.startTime}"></span>
                    <small class="text-white-50" th:text="${s.sessionDate}"></small>
                </div>
                <h4 th:text="${s.film.title}"></h4>
                <div class="mt-auto d-flex justify-content-between align-items-center">
                    <span class="price-text" th:text="${s.ticketPrice} + ' ₽'"></span>
                    <div class="btn-group">
                        <a th:href="@{/sessions/{id}/edit(id=${s.sessionId})}" class="btn btn-outline-light btn-sm">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <a th:href="@{/sessions/{id}/delete(id=${s.sessionId})}" class="btn btn-outline-danger btn-sm">
                            <i class="bi bi-trash"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
