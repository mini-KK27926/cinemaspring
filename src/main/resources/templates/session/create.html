<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Добавить сеанс</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
<nav class="navbar navbar-dark bg-warning mb-4"><div class="container-fluid">
    <a class="navbar-brand" href="/">🎬 Кинотеатр</a>
    <span class="navbar-text text-dark">➕ Добавить сеанс</span>
</div></nav>
<div class="container"><div class="row justify-content-center"><div class="col-md-8">
    <div class="card"><div class="card-header"><h4>Новый сеанс</h4></div>
        <div class="card-body">
            <form th:action="@{/sessions}" th:object="${session}" method="post">
                <!-- Фильм -->
                <div class="mb-3"><label class="form-label">Фильм *</label>
                    <select class="form-select" name="filmId" required>
                        <option value="">Выберите фильм</option>
                        <option th:each="film : ${films}" th:value="${film.filmId}" th:text="${film.title}"></option>
                    </select></div>

                <!-- Зал -->
                <div class="mb-3"><label class="form-label">Зал *</label>
                    <select class="form-select" name="hallId" required>
                        <option value="">Выберите зал</option>
                        <option th:each="hall : ${halls}" th:value="${hall.hallId}"
                                th:text="'Зал №' + ${hall.hallNumber} + ' (' + ${hall.capacity} + ' мест)'"></option>
                    </select></div>

                <!-- Дата и время -->
                <div class="row"><div class="col-md-6 mb-3">
                    <label class="form-label">Дата *</label>
                    <input type="date" class="form-control" th:field="*{sessionDate}" required>
                </div><div class="col-md-6 mb-3">
                    <label class="form-label">Время начала *</label>
                    <input type="time" class="form-control" th:field="*{startTime}" required>
                </div></div>

                <!-- Цена -->
                <div class="mb-3"><label class="form-label">Цена билета (₽) *</label>
                    <input type="number" class="form-control" th:field="*{ticketPrice}" min="0" step="0.01" required></div>

                <div class="d-flex justify-content-between">
                    <a href="/sessions" class="btn btn-secondary">← Отмена</a>
                    <button type="submit" class="btn btn-warning">💾 Сохранить</button>
                </div>
            </form>
        </div></div>
</div></div></div>
</body>
</html>
