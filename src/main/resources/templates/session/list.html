<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Сеансы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
<nav class="navbar navbar-dark bg-warning mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">🎬 Кинотеатр</a>
        <span class="navbar-text text-dark">🎫 Сеансы</span>
    </div>
</nav>
<div class="container">
    <h1>Сеансы</h1>
    <a href="/sessions/new" class="btn btn-warning mb-3">➕ Добавить сеанс</a>
    <a href="/" class="btn btn-secondary mb-3">🏠 На главную</a>

    <table class="table table-striped">
        <thead><tr><th>ID</th><th>Фильм</th><th>Зал</th><th>Дата</th><th>Время</th><th>Цена</th><th>Действия</th></tr></thead>
        <tbody>
        <tr th:each="session : ${sessions}">
            <td th:text="${session.sessionId}"></td>
            <td th:text="${session.film.title}"></td>
            <td>Зал №<span th:text="${session.hall.hallNumber}"></span></td>
            <td th:text="${session.sessionDate}"></td>
            <td th:text="${session.startTime}"></td>
            <td><span th:text="${session.ticketPrice}"></span> ₽</td>
            <td>
                <a th:href="@{'/sessions/edit/' + ${session.sessionId}}" class="btn btn-warning btn-sm">✏️</a>
                <a th:href="@{'/sessions/delete/' + ${session.sessionId}}" class="btn btn-danger btn-sm">🗑️</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
