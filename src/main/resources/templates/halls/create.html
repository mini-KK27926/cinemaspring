<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Добавить зал</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
<nav class="navbar navbar-dark bg-success mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">🎬 Кинотеатр</a>
        <span class="navbar-text text-white">➕ Добавить зал</span>
    </div>
</nav>
<div class="container">
    <div class="row justify-content-center"><div class="col-md-6">
        <div class="card"><div class="card-header"><h4>Добавить новый зал</h4></div>
            <div class="card-body">
                <form th:action="@{/halls}" th:object="${hall}" method="post">
                    <div class="mb-3"><label class="form-label">Номер зала *</label>
                        <input type="number" class="form-control" th:field="*{hallNumber}" min="1" required></div>
                    <div class="mb-3"><label class="form-label">Вместимость *</label>
                        <input type="number" class="form-control" th:field="*{capacity}" min="1" required></div>
                    <div class="d-flex justify-content-between">
                        <a href="/halls" class="btn btn-secondary">← Отмена</a>
                        <button type="submit" class="btn btn-success">💾 Сохранить</button>
                    </div>
                </form>
            </div></div>
        <div class="mt-3 text-center"><a href="/halls">← К списку залов</a></div>
    </div></div>
</div>
</body>
</html>
