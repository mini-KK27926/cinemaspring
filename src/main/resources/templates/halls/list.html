<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Залы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
<nav class="navbar navbar-dark bg-success mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">🎬 Кинотеатр</a>
        <span class="navbar-text text-white">🏛️ Залы</span>
    </div>
</nav>
<div class="container">
    <h1>Кинозалы</h1>
    <a href="/halls/new" class="btn btn-success mb-3">➕ Добавить зал</a>
    <a href="/" class="btn btn-secondary mb-3">🏠 На главную</a>

    <table class="table table-striped">
        <thead><tr><th>ID</th><th>Номер</th><th>Вместимость</th><th>Действия</th></tr></thead>
        <tbody>
        <tr th:each="hall : ${halls}">
            <td th:text="${hall.hallId}"></td>
            <td>🏛️ Зал №<span th:text="${hall.hallNumber}"></span></td>
            <td>👥 <span th:text="${hall.capacity}"></span> мест</td>
            <td>
                <a th:href="@{'/halls/edit/' + ${hall.hallId}}" class="btn btn-warning btn-sm">✏️</a>
                <a th:href="@{'/halls/delete/' + ${hall.hallId}}" class="btn btn-danger btn-sm"
                   onclick="return confirm('Удалить зал?')">🗑️</a>
            </td>
        </tr>
        </tbody>
    </table>
    <div th:if="${#lists.isEmpty(halls)}" class="alert alert-info">Залы не найдены</div>
</div>
</body>
</html>
