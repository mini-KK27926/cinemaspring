<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Билеты</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
<nav class="navbar navbar-dark bg-secondary mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">🎬 Кинотеатр</a>
        <span class="navbar-text text-white">💳 Билеты</span>
    </div>
</nav>
<div class="container">
    <h1>Билеты</h1>
    <a href="/tickets/new" class="btn btn-secondary mb-3">➕ Добавить билет</a>
    <a href="/" class="btn btn-secondary mb-3">🏠 На главную</a>

    <table class="table table-striped">
        <thead><tr><th>ID</th><th>Сеанс</th><th>Место</th><th>Статус</th><th>Действия</th></tr></thead>
        <tbody>
        <tr th:each="ticket : ${tickets}">
            <td th:text="${ticket.ticketId}"></td>
            <td th:text="${ticket.session.film.title} + ' - ' + ${ticket.session.sessionDate}"></td>
            <td>Место <span th:text="${ticket.seatNumber}"></span></td>
            <td>
                <span th:if="${ticket.status == 'свободен'}" class="badge bg-success">свободен</span>
                <span th:if="${ticket.status == 'продан'}" class="badge bg-danger">продан</span>
            </td>
            <td>
                <a th:href="@{'/tickets/edit/' + ${ticket.ticketId}}" class="btn btn-warning btn-sm">✏️</a>
                <a th:href="@{'/tickets/delete/' + ${ticket.ticketId}}" class="btn btn-danger btn-sm">🗑️</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
