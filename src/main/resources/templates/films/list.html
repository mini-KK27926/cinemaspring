<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Фильмы</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .film-card { transition: transform 0.3s; margin-bottom: 20px; }
    .film-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    .age-badge { font-size: 0.9em; padding: 4px 8px; }
    .badge-0 { background-color: #28a745; }
    .badge-6 { background-color: #17a2b8; }
    .badge-12 { background-color: #ffc107; color: #000; }
    .badge-16 { background-color: #fd7e14; }
    .badge-18 { background-color: #dc3545; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
  <div class="container">
    <a class="navbar-brand" href="/">🎬 Кинотеатр</a>
    <a class="nav-link text-white" href="/">Главная</a>
  </div>
</nav>

<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1>🎬 Фильмы <span class="badge bg-secondary" th:text="${films.size()}"></span></h1>
    <a href="/films/new" class="btn btn-primary">➕ Добавить фильм</a>
  </div>

  <!-- Поиск и фильтры -->
  <div class="card mb-4">
    <div class="card-body">
      <form th:action="@{/films}" method="get" class="row g-3">
        <div class="col-md-8">
          <input type="text" name="search" class="form-control"
                 placeholder="Поиск по названию..." th:value="${searchQuery}">
        </div>
        <div class="col-md-4">
          <button type="submit" class="btn btn-outline-primary w-100">🔍 Найти</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Список фильмов -->
  <div class="row">
    <div th:each="film : ${films}" class="col-md-4 col-lg-3">
      <div class="card film-card h-100">
        <div class="card-body">
          <h5 class="card-title" th:text="${film.title}"></h5>
          <h6 class="card-subtitle mb-2 text-muted" th:text="${film.genre}"></h6>

          <p class="card-text">
            <small class="text-muted">
              ⏱️ <span th:text="${film.duration} + ' мин'"></span><br>
              🎭
              <span th:classappend="'age-badge badge badge-' + ${film.ageRating.replace('+', '')}"
                    th:text="${film.ageRating}"></span>
            </small>
          </p>

          <div th:if="${film.description}">
            <p class="card-text small" th:text="${#strings.abbreviate(film.description, 100)}"></p>
          </div>
        </div>
        <div class="card-footer bg-transparent">
          <div class="btn-group w-100" role="group">
            <a th:href="@{'/films/edit/' + ${film.filmId}}"
               class="btn btn-outline-warning btn-sm">✏️</a>
            <a th:href="@{'/films/delete/' + ${film.filmId}}"
               class="btn btn-outline-danger btn-sm"
               onclick="return confirm('Удалить фильм «' + '$(this).closest(\".card\").find(\".card-title\").text()' + '»?')">🗑️</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Сообщение если нет фильмов -->
  <div th:if="${#lists.isEmpty(films)}" class="alert alert-info text-center">
    <h4>📭 Фильмов не найдено</h4>
    <p>Попробуйте изменить критерии поиска или <a href="/films/new">добавьте первый фильм</a>.</p>
  </div>

  <!-- Пагинация (простая) -->
  <div th:if="${films.size() > 12}" class="mt-4">
    <nav>
      <ul class="pagination justify-content-center">
        <li class="page-item"><a class="page-link" href="#">Назад</a></li>
        <li class="page-item active"><a class="page-link" href="#">1</a></li>
        <li class="page-item"><a class="page-link" href="#">2</a></li>
        <li class="page-item"><a class="page-link" href="#">3</a></li>
        <li class="page-item"><a class="page-link" href="#">Вперед</a></li>
      </ul>
    </nav>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Подтверждение удаления
  document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('.btn-outline-danger').forEach(button => {
          button.addEventListener('click', function(e) {
              const filmTitle = this.closest('.card').querySelector('.card-title').textContent;
              if (!confirm(`Удалить фильм «${filmTitle}»?`)) {
                  e.preventDefault();
              }
          });
      });
  });
</script>
</body>
</html>
