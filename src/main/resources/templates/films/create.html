<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Добавить фильм</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">🎬 Кинотеатр</a>
        <span class="navbar-text text-white">Добавить фильм</span>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">➕ Добавить новый фильм</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/films}" th:object="${film}" method="post">
                        <!-- Название -->
                        <div class="mb-3">
                            <label for="title" class="form-label">Название фильма *</label>
                            <input type="text" class="form-control" id="title" th:field="*{title}"
                                   placeholder="Введите название фильма" required>
                            <div class="form-text">Обязательное поле. Максимум 200 символов.</div>
                        </div>

                        <!-- Жанр -->
                        <div class="mb-3">
                            <label for="genre" class="form-label">Жанр *</label>
                            <input type="text" class="form-control" id="genre" th:field="*{genre}"
                                   placeholder="Например: фантастика, драма, комедия" required>
                        </div>

                        <!-- Длительность -->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="duration" class="form-label">Длительность (минуты) *</label>
                                <input type="number" class="form-control" id="duration" th:field="*{duration}"
                                       min="1" max="300" required>
                                <div class="form-text">От 1 до 300 минут.</div>
                            </div>

                            <!-- Возрастной рейтинг -->
                            <div class="col-md-6 mb-3">
                                <label for="ageRating" class="form-label">Возрастной рейтинг *</label>
                                <select class="form-select" id="ageRating" th:field="*{ageRating}" required>
                                    <option value="">Выберите рейтинг</option>
                                    <option value="0+">0+ (Для всех возрастов)</option>
                                    <option value="6+">6+ (Для детей от 6 лет)</option>
                                    <option value="12+">12+ (Для зрителей от 12 лет)</option>
                                    <option value="16+">16+ (Для зрителей от 16 лет)</option>
                                    <option value="18+">18+ (Только для взрослых)</option>
                                </select>
                            </div>
                        </div>

                        <!-- Описание -->
                        <div class="mb-3">
                            <label for="description" class="form-label">Описание</label>
                            <textarea class="form-control" id="description" th:field="*{description}"
                                      rows="4" placeholder="Краткое описание сюжета..."></textarea>
                            <div class="form-text">Необязательное поле. Максимум 1000 символов.</div>
                        </div>

                        <!-- Кнопки -->
                        <div class="d-flex justify-content-between mt-4">
                            <a href="/films" class="btn btn-secondary">← Отмена</a>
                            <button type="submit" class="btn btn-primary">💾 Сохранить фильм</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="mt-3 text-center">
                <a href="/films" class="text-decoration-none">← Вернуться к списку фильмов</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
