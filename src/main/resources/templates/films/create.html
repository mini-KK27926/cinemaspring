<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Добавить фильм</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-danger text-white">
            <h4 class="mb-0">Добавление нового фильма</h4>
        </div>
        <div class="card-body">
            <form th:action="@{/films}" th:object="${film}" method="post">

                <div class="mb-3">
                    <label class="form-label">Название фильма *</label>
                    <input type="text" class="form-control" th:field="*{title}" placeholder="Введите название" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Жанр *</label>
                    <input type="text" class="form-control" th:field="*{genre}" placeholder="Например: Драма, Комедия" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Длительность (минуты) *</label>
                    <input type="number" class="form-control" th:field="*{duration}" min="1" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Возрастной рейтинг *</label>
                    <select class="form-select" th:field="*{ageRating}" required>
                        <option value="0+">0+</option>
                        <option value="6+">6+</option>
                        <option value="12+">12+</option>
                        <option value="16+">16+</option>
                        <option value="18+">18+</option>
                    </select>
                </div>

                <div class="d-flex justify-content-between">
                    <a href="/films" class="btn btn-outline-secondary">Отмена</a>
                    <button type="submit" class="btn btn-danger">Сохранить фильм</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
