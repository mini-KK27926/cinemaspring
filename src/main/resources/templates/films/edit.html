<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактировать фильм</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-warning mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">🎬 Кинотеатр</a>
        <span class="navbar-text text-dark">✏️ Редактировать фильм</span>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card">
                <div class="card-header bg-warning">
                    <h4 class="mb-0">Редактирование: <span th:text="${film.title}"></span></h4>
                </div>
                <div class="card-body">
                    <form th:action="@{'/films/update/' + ${film.filmId}}" th:object="${film}" method="post">
                        <!-- Скрытое поле ID -->
                        <input type="hidden" th:field="*{filmId}" />

                        <!-- Название -->
                        <div class="mb-3">
                            <label for="title" class="form-label">Название фильма *</label>
                            <input type="text" class="form-control" id="title" th:field="*{title}" required>
                        </div>

                        <!-- Жанр -->
                        <div class="mb-3">
                            <label for="genre" class="form-label">Жанр *</label>
                            <input type="text" class="form-control" id="genre" th:field="*{genre}" required>
                        </div>

                        <!-- Длительность и рейтинг -->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="duration" class="form-label">Длительность (минуты) *</label>
                                <input type="number" class="form-control" id="duration" th:field="*{duration}"
                                       min="1" max="300" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="ageRating" class="form-label">Возрастной рейтинг *</label>
                                <select class="form-select" id="ageRating" th:field="*{ageRating}" required>
                                    <option th:each="rating : ${ageRatings}"
                                            th:value="${rating}"
                                            th:text="${rating}"
                                            th:selected="${rating == film.ageRating}">
                                    </option>
                                </select>
                            </div>
                        </div>

                        <!-- Описание -->
                        <div class="mb-3">
                            <label for="description" class="form-label">Описание</label>
                            <textarea class="form-control" id="description" th:field="*{description}"
                                      rows="4"></textarea>
                        </div>

                        <!-- Кнопки -->
                        <div class="d-flex justify-content-between mt-4">
                            <a href="/films" class="btn btn-secondary">← Отмена</a>
                            <div>
                                <button type="submit" class="btn btn-warning">💾 Сохранить изменения</button>
                                <a th:href="@{'/films/delete/' + ${film.filmId}}"
                                   class="btn btn-danger"
                                   onclick="return confirm('Удалить фильм «' + document.getElementById('title').value + '»?')">
                                    🗑️ Удалить
                                </a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <div class="mt-3 text-center">
                <a href="/films" class="text-decoration-none">← Вернуться к списку фильмов</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
