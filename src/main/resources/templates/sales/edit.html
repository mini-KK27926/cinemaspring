<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактировать продажу | Кинотеатр</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        .form-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .form-card {
            border: 1px solid #dee2e6;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .sale-info {
            background-color: #f8f9fa;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 20px;
            border-left: 4px solid #198754;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/"><i class="bi bi-camera-reels"></i> КИНОТЕАТР</a>
    </div>
</nav>

<div class="container">
    <div class="form-container">
        <div class="form-card">
            <h2 class="mb-4"><i class="bi bi-pencil text-warning"></i> Редактировать продажу</h2>

            <!-- Информация о продаже -->
            <div class="sale-info">
                <h6>Информация о продаже</h6>
                <div class="row">
                    <div class="col-6">
                        <strong>ID:</strong> <span th:text="${sale.saleId}">1</span><br>
                        <strong>Клиент:</strong> <span th:text="${sale.customerName}">Клиент</span><br>
                        <strong>Дата продажи:</strong>
                        <span th:text="${sale.saleDatetime ? #dates.format(sale.saleDatetime, 'dd.MM.yyyy HH:mm') : 'Не указано'}">
                            01.01.2024 18:00
                        </span>
                    </div>
                    <div class="col-6 text-end">
                        <strong>Билетов:</strong> <span th:text="${sale.ticketsCount}">1</span><br>
                        <strong>Сумма:</strong> <span th:text="${sale.paymentAmount} + ' ₽'">500 ₽</span>
                    </div>
                </div>
            </div>

            <form th:action="@{/sales/{id}(id=${sale.saleId})}" th:object="${sale}" method="post">

                <!-- Выбор сеанса -->
                <div class="mb-3">
                    <label class="form-label">Сеанс *</label>
                    <select class="form-select" th:field="*{session.sessionId}"
                            id="sessionSelect" onchange="updateSessionInfo()" required>
                        <option value="">Выберите сеанс</option>
                        <option th:each="sessionItem : ${sessions}"
                                th:value="${sessionItem.sessionId}"
                                th:data-price="${sessionItem.ticketPrice}"
                                th:data-film="${sessionItem.film?.title}"
                                th:data-time="${#dates.format(sessionItem.startTime, 'dd.MM.yyyy HH:mm')}"
                                th:data-hall="${sessionItem.hallNumber}"
                                th:data-seats="${sessionItem.availableSeats}"
                                th:selected="${sessionItem.sessionId == sale.session?.sessionId}"
                                th:text="${sessionItem.film?.title} + ' - ' + ${#dates.format(sessionItem.startTime, 'dd.MM.yyyy HH:mm')}">
                        </option>
                    </select>

                    <!-- Информация о сеансе -->
                    <div id="sessionInfo" class="mt-2 p-2 border rounded" style="display: none;">
                        <div class="row">
                            <div class="col-6">
                                <strong id="filmTitle"></strong><br>
                                <small id="sessionTime"></small><br>
                                <small>Зал: <span id="hallNumber"></span></small>
                            </div>
                            <div class="col-6 text-end">
                                <span class="badge bg-secondary" id="availableSeats"></span><br>
                                <span class="badge bg-success" id="ticketPrice"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Имя клиента -->
                <div class="mb-3">
                    <label class="form-label">Имя клиента *</label>
                    <input type="text" class="form-control"
                           th:field="*{customerName}" required>
                </div>

                <!-- Количество билетов -->
                <div class="mb-3">
                    <label class="form-label">Количество билетов *</label>
                    <input type="number" class="form-control"
                           th:field="*{ticketsCount}"
                           id="ticketsCount"
                           min="1" required>
                </div>

                <!-- Сумма оплаты -->
                <div class="mb-3">
                    <label class="form-label">Сумма оплаты (руб.) *</label>
                    <input type="number" class="form-control"
                           th:field="*{paymentAmount}"
                           id="paymentAmount"
                           min="1" step="0.01" required>
                </div>

                <!-- Дата и время продажи -->
                <div class="mb-4">
                    <label class="form-label">Дата и время продажи</label>
                    <input type="datetime-local" class="form-control"
                           th:field="*{saleDatetime}"
                           th:value="${sale.saleDatetime ? #dates.format(sale.saleDatetime, 'yyyy-MM-dd\'T\'HH:mm') : ''}">
                </div>

                <!-- Кнопки -->
                <div class="d-flex justify-content-between">
                    <a href="/sales" class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> Назад
                    </a>
                    <button type="submit" class="btn btn-warning">
                        <i class="bi bi-save"></i> Сохранить изменения
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function updateSessionInfo() {
        const select = document.getElementById('sessionSelect');
        const selectedOption = select.options[select.selectedIndex];
        const sessionInfo = document.getElementById('sessionInfo');

        if (selectedOption.value) {
            // Показываем информацию о сеансе
            document.getElementById('filmTitle').textContent = selectedOption.dataset.film;
            document.getElementById('sessionTime').textContent = selectedOption.dataset.time;
            document.getElementById('hallNumber').textContent = selectedOption.dataset.hall;
            document.getElementById('availableSeats').textContent = 'Свободно: ' + selectedOption.dataset.seats;
            document.getElementById('ticketPrice').textContent = 'Цена: ' + selectedOption.dataset.price + ' ₽';

            sessionInfo.style.display = 'block';

            // Автоматически рассчитываем сумму оплаты
            calculateTotal();
        } else {
            sessionInfo.style.display = 'none';
        }
    }

    function calculateTotal() {
        const select = document.getElementById('sessionSelect');
        const selectedOption = select.options[select.selectedIndex];
        const ticketsCount = document.getElementById('ticketsCount').value;

        if (selectedOption.value && ticketsCount) {
            const price = parseFloat(selectedOption.dataset.price);
            const count = parseInt(ticketsCount);
            const total = price * count;

            document.getElementById('paymentAmount').value = total.toFixed(2);
        }
    }

    // Слушаем изменения количества билетов
    document.getElementById('ticketsCount').addEventListener('input', calculateTotal);

    // Инициализируем при загрузке
    document.addEventListener('DOMContentLoaded', function() {
        updateSessionInfo();
    });
</script>
</body>
</html>
