<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Продажи</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">🎬 Кинотеатр</a>
        <span class="navbar-text text-white">💰 Продажи</span>
    </div>
</nav>
<div class="container">
    <h1>Продажи билетов</h1>
    <a href="/sales/new" class="btn btn-dark mb-3">➕ Новая продажа</a>
    <a href="/" class="btn btn-secondary mb-3">🏠 На главную</a>

    <table class="table table-striped">
        <thead><tr><th>ID</th><th>Билет</th><th>Кассир</th><th>Дата продажи</th><th>Сумма</th><th>Действия</th></tr></thead>
        <tbody>
        <tr th:each="sale : ${sales}">
            <td th:text="${sale.saleId}"></td>
            <td>Билет #<span th:text="${sale.ticket.ticketId}"></span></td>
            <td th:text="${sale.cashier.fullName}"></td>
            <td th:text="${sale.saleDatetime}"></td>
            <td><span th:text="${sale.paymentAmount}"></span> ₽</td>
            <td>
                <a th:href="@{'/sales/delete/' + ${sale.saleId}}" class="btn btn-danger btn-sm"
                   onclick="return confirm('Отменить продажу?')">🗑️</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
